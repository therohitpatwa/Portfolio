                  document.addEventListener("DOMContentLoaded", () => {

                    const lockScreen = document.getElementById("lock-screen");
                    const content = document.getElementById("protected-content");

                    if (!input || !btn) return;

                    const checkPassword = () => {

                        // Success animation
                        lockScreen.style.transform = "scale(0.95)";
