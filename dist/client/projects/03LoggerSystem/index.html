    (function () {
        function updateAllIcons(theme) {
            document.querySelectorAll(".theme-toggle-btn").forEach((btn) => {
                const moon = btn.querySelector(".icon-moon");
                const sun = btn.querySelector(".icon-sun");
                const track = btn.querySelector(".toggle-track");
                const knob = btn.querySelector(".toggle-knob");

                if (theme === "lofi") {
                    // Light mode styling
                    if (knob) knob.style.transform = "translateX(16px)";
                    if (moon) {
                        moon.classList.remove("text-base-content");
                        moon.classList.add("text-gray-400");
                    }
                    if (sun) {
                        sun.classList.remove("text-gray-400");
                        sun.classList.add("text-base-content");
                    }
                    if (track) track.classList.add("border-gray-300");
                } else {
                    // Dark mode styling
                    if (knob) knob.style.transform = "translateX(0px)";
                    if (moon) {
                        moon.classList.remove("text-gray-400");
                        moon.classList.add("text-base-content");
                    }
                    if (sun) {
                        sun.classList.remove("text-base-content");
                        sun.classList.add("text-gray-400");
                    }
                    if (track) track.classList.remove("border-gray-300");
                }
            });
        }

        // Initial icon state
        const currentTheme = localStorage.getItem("theme") || "black";
        updateAllIcons(currentTheme);

        document.querySelectorAll(".theme-toggle-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
                let theme = document.documentElement.getAttribute("data-theme");
                let newTheme = theme === "lofi" ? "black" : "lofi";

                document.documentElement.setAttribute("data-theme", newTheme);
                localStorage.setItem("theme", newTheme);

                // Update inline styles that were set by index.astro to prevent flicker
                var bgColor = newTheme === "lofi" ? "#FFFFFF" : "#000000";
                document.documentElement.style.cssText =
                    "background-color: " + bgColor + " !important;";

                // Update theme-init style block
                const themeInit = document.getElementById("theme-init");
                if (themeInit) {
                    themeInit.innerHTML =
                        "html,body{background-color:" +
                        bgColor +
                        " !important; transition: background-color 0.3s ease !important;}";
                }

                updateAllIcons(newTheme);
            });
        });
    })();
